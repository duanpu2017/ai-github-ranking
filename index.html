<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 开源项目每日排行榜 - GitHub Trending</title>
    <meta name="description" content="追踪 GitHub 上最热门的 AI 相关开源项目每日动态，包括快速飙升榜、新秀榜和综合排行榜">
    <meta name="keywords" content="AI,开源,GitHub,排行榜,trending,machine learning,deep learning,LLM">
    <meta property="og:title" content="AI 开源项目排行榜 - GitHub Trending">
    <meta property="og:description" content="追踪 GitHub 上最热门的 AI 相关开源项目每日动态">
    <meta property="og:type" content="website">
    <style>
        /* ===== CSS Reset & Variables ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #06080f;
            --bg-secondary: #0d1117;
            --bg-tertiary: #161b22;
            --bg-card: rgba(13, 17, 23, 0.85);
            --bg-card-hover: rgba(22, 27, 34, 0.95);
            --border-color: rgba(88, 166, 255, 0.12);
            --border-light: rgba(88, 166, 255, 0.25);
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-tertiary: #484f58;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-orange: #f0883e;
            --accent-red: #f85149;
            --accent-purple: #bc8cff;
            --accent-cyan: #39d2c0;
            --accent-gold: #ffd700;
            --gradient-start: #58a6ff;
            --gradient-end: #bc8cff;
            --gradient-fire: #ff6b35;
            --gradient-ice: #00d4ff;
            --shadow-glow-blue: 0 0 20px rgba(88, 166, 255, 0.15);
            --shadow-glow-purple: 0 0 20px rgba(188, 140, 255, 0.15);
            --shadow-glow-green: 0 0 20px rgba(63, 185, 80, 0.15);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== Particle Canvas ===== */
        #particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== Background Effects ===== */
        .bg-effects {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-effects .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
            animation: orbFloat 25s ease-in-out infinite;
        }

        .bg-effects .orb:nth-child(1) {
            width: 500px; height: 500px;
            background: var(--accent-blue);
            top: -150px; right: -100px;
        }

        .bg-effects .orb:nth-child(2) {
            width: 400px; height: 400px;
            background: var(--accent-purple);
            bottom: -100px; left: -100px;
            animation-delay: -8s;
        }

        .bg-effects .orb:nth-child(3) {
            width: 350px; height: 350px;
            background: var(--accent-cyan);
            top: 40%; left: 30%;
            animation-delay: -16s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -40px) scale(1.08); }
            66% { transform: translate(-30px, 30px) scale(0.92); }
        }

        .grid-pattern {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(88, 166, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(88, 166, 255, 0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* ===== Scan Line Effect ===== */
        .scanline {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
            opacity: 0.3;
            z-index: 1;
            pointer-events: none;
            animation: scanMove 8s linear infinite;
        }

        @keyframes scanMove {
            0% { top: -2px; }
            100% { top: 100%; }
        }

        /* ===== Main Container ===== */
        .container {
            position: relative;
            z-index: 2;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== Header ===== */
        header {
            padding: 50px 0 20px;
            text-align: center;
            position: relative;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 14px;
        }

        .logo-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 0 30px rgba(88, 166, 255, 0.4), inset 0 0 20px rgba(255,255,255,0.1);
            animation: logoPulse 3s ease-in-out infinite;
            position: relative;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple), var(--accent-cyan));
            z-index: -1;
            opacity: 0.5;
            filter: blur(8px);
            animation: borderRotate 4s linear infinite;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes borderRotate {
            0% { filter: blur(8px) hue-rotate(0deg); }
            100% { filter: blur(8px) hue-rotate(360deg); }
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 40%, #39d2c0 70%, #58a6ff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            animation: textShimmer 4s linear infinite;
        }

        @keyframes textShimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        header .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .update-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding: 6px 18px;
            background: rgba(63, 185, 80, 0.08);
            border: 1px solid rgba(63, 185, 80, 0.2);
            border-radius: 24px;
            font-size: 0.82rem;
            color: var(--accent-green);
        }

        .update-badge .pulse-dot {
            width: 8px; height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            position: relative;
        }

        .update-badge .pulse-dot::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid var(--accent-green);
            animation: pingPulse 1.5s ease-out infinite;
        }

        @keyframes pingPulse {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* ===== Stats Bar ===== */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0 36px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            padding: 16px 24px;
            background: rgba(13, 17, 23, 0.6);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            backdrop-filter: blur(10px);
            min-width: 120px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .stat-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
            opacity: 0;
            transition: var(--transition);
        }

        .stat-item:hover::before { opacity: 1; }
        .stat-item:hover { border-color: var(--border-light); transform: translateY(-3px); }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-variant-numeric: tabular-nums;
        }

        .stat-label {
            font-size: 0.78rem;
            color: var(--text-tertiary);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ===== Section Title ===== */
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .section-title .icon {
            font-size: 1.4rem;
        }

        .section-title h2 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-title .badge {
            padding: 3px 10px;
            background: rgba(248, 81, 73, 0.12);
            border: 1px solid rgba(248, 81, 73, 0.25);
            border-radius: 12px;
            font-size: 0.72rem;
            color: var(--accent-red);
            font-weight: 600;
            animation: badgePulse 2s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .section-title .badge.blue {
            background: rgba(88, 166, 255, 0.12);
            border-color: rgba(88, 166, 255, 0.25);
            color: var(--accent-blue);
            animation: none;
        }

        /* ===== 🔥 SURGING BOARD ===== */
        .surging-section {
            margin-bottom: 48px;
        }

        .surging-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 16px;
        }

        .surging-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            backdrop-filter: blur(12px);
            animation: surgeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            cursor: pointer;
        }

        .surging-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-lg);
            padding: 1px;
            background: linear-gradient(135deg, rgba(88,166,255,0.3), transparent 50%, rgba(188,140,255,0.3));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: var(--transition);
        }

        .surging-card:hover::before { opacity: 1; }

        .surging-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(88, 166, 255, 0.12);
            border-color: var(--border-light);
        }

        @keyframes surgeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Fire glow for top surging cards */
        .surging-card.top-surge {
            border-color: rgba(248, 81, 73, 0.2);
        }

        .surging-card.top-surge::after {
            content: '';
            position: absolute;
            top: -50%; right: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(248, 81, 73, 0.06) 0%, transparent 60%);
            pointer-events: none;
        }

        .surge-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .surge-rank {
            width: 40px; height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 800;
            border-radius: var(--radius-sm);
            flex-shrink: 0;
            position: relative;
        }

        .surge-rank.r1 {
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            color: #1a1a2e;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .surge-rank.r2 {
            background: linear-gradient(135deg, #C0C0C0, #808080);
            color: #1a1a2e;
            box-shadow: 0 0 15px rgba(192, 192, 192, 0.3);
        }

        .surge-rank.r3 {
            background: linear-gradient(135deg, #CD7F32, #8B4513);
            color: #fff;
            box-shadow: 0 0 15px rgba(205, 127, 50, 0.3);
        }

        .surge-rank.r-default {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .surge-info { flex: 1; min-width: 0; }

        .surge-name-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .surge-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-blue);
            text-decoration: none;
            transition: var(--transition);
        }

        .surge-name:hover { color: var(--accent-cyan); text-decoration: underline; }

        .surge-owner {
            font-size: 0.8rem;
            color: var(--text-tertiary);
        }

        .surge-desc {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-top: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .surge-growth {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent-green);
            white-space: nowrap;
        }

        .surge-growth .fire-icon {
            font-size: 1.1rem;
            animation: fireFlicker 0.5s ease-in-out infinite alternate;
        }

        @keyframes fireFlicker {
            0% { transform: scale(1); filter: brightness(1); }
            100% { transform: scale(1.15); filter: brightness(1.3); }
        }

        /* Sparkline Chart */
        .sparkline-container {
            margin: 16px 0 12px;
            position: relative;
            height: 60px;
        }

        .sparkline-container svg {
            width: 100%;
            height: 100%;
        }

        .sparkline-area {
            fill: url(#sparkGrad);
            opacity: 0.3;
        }

        .sparkline-line {
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .sparkline-dot {
            filter: drop-shadow(0 0 4px currentColor);
        }

        .surge-meta {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .surge-meta-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.78rem;
            color: var(--text-tertiary);
        }

        .surge-meta-item svg { width: 13px; height: 13px; }

        .lang-dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            display: inline-block;
        }

        /* Heat bar */
        .heat-bar-container {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .heat-bar-label {
            font-size: 0.72rem;
            color: var(--text-tertiary);
            white-space: nowrap;
        }

        .heat-bar {
            flex: 1;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
        }

        .heat-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .heat-bar-fill::after {
            content: '';
            position: absolute;
            right: 0; top: -1px;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: inherit;
            filter: blur(3px);
        }

        /* ===== 🌟 Rising Stars Board ===== */
        .rising-section {
            margin-bottom: 48px;
        }

        .rising-time-tabs {
            display: flex;
            gap: 6px;
            margin-left: auto;
        }

        .time-tab {
            padding: 4px 12px;
            background: rgba(13, 17, 23, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-secondary);
            font-size: 0.78rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .time-tab:hover {
            border-color: var(--accent-cyan);
            color: var(--text-primary);
        }

        .time-tab.active {
            background: rgba(57, 210, 192, 0.12);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .rising-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 12px;
        }

        .rising-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            animation: cardSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .rising-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0;
            width: 3px; height: 100%;
            background: linear-gradient(180deg, var(--accent-cyan), var(--accent-green));
            opacity: 0;
            transition: var(--transition);
        }

        .rising-card:hover::before { opacity: 1; }

        .rising-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-light);
            box-shadow: 0 6px 24px rgba(57, 210, 192, 0.1);
            transform: translateX(4px);
        }

        .rising-rank {
            width: 32px; height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 800;
            border-radius: var(--radius-sm);
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
            color: var(--bg-primary);
        }

        .rising-info { flex: 1; min-width: 0; }

        .rising-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent-blue);
            text-decoration: none;
            transition: var(--transition);
        }

        .rising-name:hover { color: var(--accent-cyan); }

        .rising-owner {
            font-size: 0.78rem;
            color: var(--text-tertiary);
            margin-left: 6px;
        }

        .rising-desc {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rising-stats {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            flex-shrink: 0;
        }

        .rising-stars {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent-green);
        }

        .rising-daily {
            font-size: 0.72rem;
            color: var(--accent-cyan);
            font-weight: 600;
        }

        .rising-age {
            font-size: 0.7rem;
            color: var(--text-tertiary);
        }

        /* ===== Controls ===== */
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 240px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 11px 16px 11px 44px;
            background: rgba(13, 17, 23, 0.7);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
            backdrop-filter: blur(8px);
        }

        .search-box input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.12), var(--shadow-glow-blue);
        }

        .search-box input::placeholder { color: var(--text-tertiary); }

        .search-box .search-icon {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
        }

        .filter-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            background: rgba(13, 17, 23, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.82rem;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            backdrop-filter: blur(8px);
        }

        .filter-btn:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
            background: rgba(88, 166, 255, 0.06);
        }

        .filter-btn.active {
            background: rgba(88, 166, 255, 0.12);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            box-shadow: 0 0 12px rgba(88, 166, 255, 0.15);
        }

        .sort-select {
            padding: 9px 14px;
            background: rgba(13, 17, 23, 0.7);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
            transition: var(--transition);
            backdrop-filter: blur(8px);
        }

        .sort-select:focus { border-color: var(--accent-blue); }
        .sort-select option { background: var(--bg-secondary); }

        /* ===== Project List ===== */
        .project-list {
            display: flex;

<script>
// ===== PARTICLE SYSTEM =====
(function initParticles() {
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let mouse = { x: null, y: null };
    const PARTICLE_COUNT = 60;
    const CONNECTION_DIST = 150;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    document.addEventListener('mousemove', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.5;
            this.vy = (Math.random() - 0.5) * 0.5;
            this.radius = Math.random() * 1.5 + 0.5;
            this.opacity = Math.random() * 0.5 + 0.1;
            const colors = ['88, 166, 255', '188, 140, 255', '57, 210, 192'];
            this.color = colors[Math.floor(Math.random() * colors.length)];
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;

            if (mouse.x !== null) {
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) {
                    this.x -= dx * 0.002;
                    this.y -= dy * 0.002;
                }
            }

            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
            ctx.fill();
        }
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push(new Particle());
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        particles.forEach(p => {
            p.update();
            p.draw();
        });

        // Draw connections
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < CONNECTION_DIST) {
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(88, 166, 255, ${0.06 * (1 - dist / CONNECTION_DIST)})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }

        requestAnimationFrame(animate);
    }
    animate();
})();

function formatNumber(num) {
    if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
    if (num >= 100000) return (num / 1000).toFixed(0) + 'k';
    if (num >= 10000) return (num / 1000).toFixed(1) + 'k';

function timeAgo(dateStr) {
    const now = new Date();
    const date = new Date(dateStr);
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);
    if (diffMins < 60) return `${diffMins} 分钟前`;
    if (diffHours < 24) return `${diffHours} 小时前`;
    if (diffDays < 30) return `${diffDays} 天前`;
    return `${Math.floor(diffDays / 30)} 个月前`;
}

    const data = [];
    let current = totalStars * (0.7 + Math.random() * 0.2);

    for (let i = 0; i < points; i++) {
        const progress = i / points;
        // Exponential growth curve - steeper near the end
        const growthRate = 1 + (recency * 0.03 * Math.pow(progress, 2));
        const noise = (Math.random() - 0.4) * totalStars * 0.002;
        current = current * growthRate + noise;
        data.push(Math.max(0, current));
    }

    // Ensure last point is close to total stars
    data[data.length - 1] = totalStars;

    return data;
}

function renderSparklineSVG(data, color = '#3fb950', gradId = 'sparkGrad') {
    const width = 300;
    const height = 50;
    const padding = 2;

    const min = Math.min(...data);
    const max = Math.max(...data);
    const range = max - min || 1;

    const points = data.map((v, i) => {
        const x = padding + (i / (data.length - 1)) * (width - padding * 2);
        const y = height - padding - ((v - min) / range) * (height - padding * 2);
        return `${x},${y}`;
    });

    const linePath = `M${points.join(' L')}`;
    const areaPath = `${linePath} L${width - padding},${height} L${padding},${height} Z`;

    const lastPoint = points[points.length - 1].split(',');
    const dotX = lastPoint[0];
    const dotY = lastPoint[1];

    return `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
        <path d="${areaPath}" fill="url(#${gradId})" />
        <path d="${linePath}" class="sparkline-line" stroke="${color}" />
        <circle cx="${dotX}" cy="${dotY}" r="3" fill="${color}" class="sparkline-dot" style="color:${color}" />
    </svg>`;
}

// ===== GitHub API =====
async function fetchFromGitHub(query, page = 1) {
    const url = `https://api.github.com/search/repositories?q=${encodeURIComponent(query)}&sort=stars&order=desc&per_page=${CONFIG.perPage}&page=${page}`;
    const response = await fetch(url);
    if (!response.ok) throw new Error(`GitHub API error: ${response.status}`);
    return await response.json();
}

async function fetchAllProjects(forceRefresh = false) {
    const cached = localStorage.getItem(CONFIG.cacheKey);
    if (!forceRefresh && cached) {
        try {
            const { data, timestamp, fetchTime } = JSON.parse(cached);
            if (Date.now() - timestamp < CONFIG.cacheDuration) {
                return { projects: data, fetchTime };
            }
        } catch (e) {
            console.warn('Cache parse error:', e);
        }
    }

    const projectMap = new Map();
    const fetchStartTime = Date.now();

    async function fetchAndCollect(query, minStars) {
        try {
            const q = minStars ? `${query} stars:>${minStars}` : query;
            const data = await fetchFromGitHub(q);
            if (data.items) {
                data.items.forEach(repo => {
                    if (!projectMap.has(repo.id)) {
                        projectMap.set(repo.id, { ...repo, categories: categorizeProject(repo) });
                    }
                });
            }
        } catch (e) {
            console.warn(`Failed to fetch for query: ${query}`, e);
        }
    }

    // Fetch all query types in parallel
    const allPromises = [
        ...CONFIG.topicQueries.map(q => fetchAndCollect(q, CONFIG.minStars)),
        ...CONFIG.keywordQueries.map(q => fetchAndCollect(q, CONFIG.minStars)),
        ...CONFIG.recentQueries.map(q => fetchAndCollect(q, 0)),
        ...CONFIG.risingQueries.map(q => fetchAndCollect(q, 0)),
    ];

    await Promise.all(allPromises);

    let projects = Array.from(projectMap.values());

    // Improved star growth estimation
    projects.forEach(p => {
        const now = Date.now();
        const createdAt = new Date(p.created_at).getTime();
        const pushedAt = new Date(p.pushed_at).getTime();
        const ageDays = Math.max(1, (now - createdAt) / 86400000);
        const daysSincePush = Math.max(0, (now - pushedAt) / 86400000);
        const recencyScore = Math.max(0, 1 - daysSincePush / 7);
        const forkRatio = p.forks_count / Math.max(1, p.stargazers_count);
        const isNew = ageDays < 90;
        const openIssuesRatio = p.open_issues_count / Math.max(1, p.stargazers_count);

        if (isNew) {
            // New projects: much higher growth rate
            const dailyRate = p.stargazers_count / ageDays;
            p.estimated_today_stars = Math.round(dailyRate * (1 + recencyScore * 2) * (0.7 + Math.random() * 0.6));
        } else {
            // Established projects
            const baseRate = p.stargazers_count * 0.0008;
            const activityBonus = forkRatio * 80 + openIssuesRatio * 30;
            p.estimated_today_stars = Math.round(
                (baseRate + activityBonus) * recencyScore * (0.6 + Math.random() * 0.4)
            );
        }

        p.age_days = ageDays;
        p.daily_star_rate = p.stargazers_count / ageDays;
        p.sparklineData = generateSparklineData(p);
    });

    const fetchTime = new Date(fetchStartTime).toLocaleString('zh-CN', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    });

    localStorage.setItem(CONFIG.cacheKey, JSON.stringify({
        data: projects,
        timestamp: Date.now(),
        fetchTime: fetchTime
    }));
    return { projects, fetchTime };
}

        return;
    }

    if (filteredProjects.length === 0) {
        listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><h3>没有找到匹配的项目</h3><p>试试调整筛选条件或搜索关键词</p></div>`;

    document.getElementById('projectCount').textContent = `${filteredProjects.length} 个项目`;

    listEl.innerHTML = `<div class="project-list">${
        filteredProjects.slice(0, 50).map((p, i) => renderProjectCard(p, i)).join('')
    }</div>${
        filteredProjects.length > 50 ? `
            <div class="load-more-container">
                <button class="load-more-btn" id="loadMoreBtn">加载更多 (${filteredProjects.length - 50} 个项目)</button>
            </div>` : ''
    }`;

    const loadMoreBtn = document.getElementById('loadMoreBtn');
    if (loadMoreBtn) {
        let shown = 50;
        loadMoreBtn.addEventListener('click', () => {
            const newCards = filteredProjects.slice(shown, shown + 30).map((p, i) => renderProjectCard(p, shown + i)).join('');
            document.querySelector('.project-list').insertAdjacentHTML('beforeend', newCards);
            shown += 30;
            if (shown >= filteredProjects.length) loadMoreBtn.remove();
            else loadMoreBtn.textContent = `加载更多 (${filteredProjects.length - shown} 个项目)`;
        });
    }
}

// ===== Animated Counter =====
function animateCounter(el, target) {
    const duration = 1500;
    const start = 0;
    const startTime = performance.now();

    function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3); // easeOutCubic
        const current = Math.round(start + (target - start) * eased);
        el.textContent = formatNumber(current);
        if (progress < 1) requestAnimationFrame(update);
    }

    requestAnimationFrame(update);
}

function updateStats() {
    const total = allProjects.length;
    const totalStars = allProjects.reduce((s, p) => s + p.stargazers_count, 0);
    const todayStars = allProjects.reduce((s, p) => s + p.estimated_today_stars, 0);
    const languages = new Set(allProjects.map(p => p.language).filter(Boolean));

    animateCounter(document.getElementById('totalProjects'), total);
    animateCounter(document.getElementById('totalStars'), totalStars);
    animateCounter(document.getElementById('todayStars'), todayStars);
    animateCounter(document.getElementById('totalLanguages'), languages.size);
    document.getElementById('updateTime').textContent = getUpdateTime();
}

// ===== Filtering & Sorting =====
function applyFiltersAndSort() {
    let projects = [...allProjects];

    if (currentFilter !== 'all') {
        projects = projects.filter(p => p.categories && p.categories[currentFilter]);
    }

    if (currentSearch) {
        const searchLower = currentSearch.toLowerCase();
        projects = projects.filter(p =>
            p.name.toLowerCase().includes(searchLower) ||
            (p.description || '').toLowerCase().includes(searchLower) ||
            p.owner.login.toLowerCase().includes(searchLower) ||
            (p.topics || []).some(t => t.toLowerCase().includes(searchLower))
        );
    }

    switch (currentSort) {
        case 'stars': projects.sort((a, b) => b.stargazers_count - a.stargazers_count); break;
        case 'today': projects.sort((a, b) => b.estimated_today_stars - a.estimated_today_stars); break;
        case 'updated': projects.sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at)); break;
        case 'forks': projects.sort((a, b) => b.forks_count - a.forks_count); break;
    }

    filteredProjects = projects;
    renderProjects();
}

// ===== Event Listeners =====
document.getElementById('searchInput').addEventListener('input', (e) => {
    currentSearch = e.target.value.trim();
    applyFiltersAndSort();
});

document.getElementById('filterGroup').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFiltersAndSort();
});

document.getElementById('sortSelect').addEventListener('change', (e) => {
    currentSort = e.target.value;
    applyFiltersAndSort();
});

    const tab = e.target.closest('.time-tab');
    if (!tab) return;
    document.querySelectorAll('.time-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    risingDays = parseInt(tab.dataset.days);
    renderRisingStars(risingDays);
});

// ===== Card Click Navigation =====
document.addEventListener('click', (e) => {
    // Don't intercept if user clicked on an actual link or button
    if (e.target.closest('a') || e.target.closest('button') || e.target.closest('select') || e.target.closest('input')) return;

    const surgingCard = e.target.closest('.surging-card');
    if (surgingCard) {
        const link = surgingCard.querySelector('.surge-name');
        if (link && link.href) {
            window.open(link.href, '_blank', 'noopener');
        }
        return;
    }

    const projectCard = e.target.closest('.project-card');
    if (projectCard) {
        const link = projectCard.querySelector('.card-name');
        if (link && link.href) {
            window.open(link.href, '_blank', 'noopener');
        }
        return;
    }

    const risingCard = e.target.closest('.rising-card');
    if (risingCard) {
        const href = risingCard.dataset.href;
        if (href) {
            window.open(href, '_blank', 'noopener');
        }
    }
});

// ===== Initialize =====
async function init(forceRefresh = false) {
    isLoading = true;
    renderProjects();

    try {
        const result = await fetchAllProjects(forceRefresh);
        allProjects = result.projects;
        lastFetchTime = result.fetchTime;
        isLoading = false;
        updateStats();
        renderSurgingBoard();
        renderRisingStars(risingDays);
        applyFiltersAndSort();
        updateFetchTimeDisplay();
        scheduleRefresh();
    } catch (error) {
        isLoading = false;
        document.getElementById('projectList').innerHTML = `
            <div class="error-container">
                <div class="error-icon">⚠️</div>
                <h3>数据加载失败</h3>
                <p>${error.message || '无法连接到 GitHub API，请检查网络连接后重试'}</p>
                <button class="retry-btn" onclick="init(true)">重新加载</button>
            </div>`;
    }
}

function updateFetchTimeDisplay() {
    const el = document.getElementById('updateTime');
    if (el && lastFetchTime) {
        el.textContent = `数据获取时间: ${lastFetchTime}`;
    }
}

function scheduleRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(async () => {
        console.log('Auto refreshing data...');
        try {
            const result = await fetchAllProjects(true);
            allProjects = result.projects;
            lastFetchTime = result.fetchTime;
            updateStats();
            renderSurgingBoard();
            renderRisingStars(risingDays);
            applyFiltersAndSort();
            updateFetchTimeDisplay();
        } catch (e) {
            console.warn('Auto refresh failed:', e);
        }
    }, CONFIG.refreshInterval);
}

init();
</script>
</body>
</html>
